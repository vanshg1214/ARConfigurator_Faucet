<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>A-Frame: Tap to Place Ground</title>
  <meta itemprop="name" content="A-Frame: Tap to Place Ground">
  <meta name="twitter:title" content="A-Frame: Tap to Place Ground">
  <meta property="og:title" content="A-Frame: Tap to Place Ground">
  <meta property="og:site_name" content="A-Frame: Tap to Place Ground">
  <meta name="description"
    content="This example allows the user to grow cacti 🌵  by tapping or clicking the ground. Showcases raycasting, spawning objects, and importing a 3D model.">
  <meta itemprop="description"
    content="This example allows the user to grow cacti 🌵  by tapping or clicking the ground. Showcases raycasting, spawning objects, and importing a 3D model.">
  <meta property="og:description"
    content="This example allows the user to grow cacti 🌵  by tapping or clicking the ground. Showcases raycasting, spawning objects, and importing a 3D model.">
  <meta name="twitter:description"
    content="This example allows the user to grow cacti 🌵  by tapping or clicking the ground. Showcases raycasting, spawning objects, and importing a 3D model.">
  <meta property="og:image" content="https://8thwall.org/aframe-world-effects/assets/preview.gif" />

  <script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" crossorigin="anonymous" async="true"
    data-preload-chunks="slam"></script>
</head>

<body>
  <script src="bundle.js?v=1.0.7"></script>
  <!-- Copyright (c) 2022 8th Wall, Inc. -->
  <!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

  <div class="over">
    <span id="promptText">Tap To Place Model</span>
  </div>

  <div id="actionContainer" class="action-container" style="display: none;">
    <button id="btnWater" class="action-btn">
      <svg class="water-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
      </svg>
      <span id="waterBtnText">Flow</span>
    </button>
  </div>

  <div id="buttonContainer" class="button-container" style="display: none;">
    <button id="btnGold" class="sphere-btn gold-btn"></button>
    <button id="btnSilver" class="sphere-btn silver-btn"></button>
    <button id="btnBlack" class="sphere-btn black-btn"></button>
  </div>

  <!-- Add the tap-place component to the scene so it has an effect -->
  <a-scene tap-place landing-page xrextras-loading xrextras-runtime-error renderer="colorManagement:true" xrweb="
    allowedDevices: any;
    defaultEnvironmentFogIntensity: 0.5; 
    defaultEnvironmentFloorTexture: #groundTex; 
    defaultEnvironmentFloorColor: #FFF;
    defaultEnvironmentSkyBottomColor: #B4C4CC; 
    defaultEnvironmentSkyTopColor: #5ac8fa;
    defaultEnvironmentSkyGradientStrength: 0.5;">

    <!-- We can define assets here to be loaded when A-Frame initializes -->
    <a-assets>
      <img id="groundTex" src="assets/sand.jpg">
      <a-asset-item id="faucetModel" src="assets/DeltaFaucet_V5_Decimated_Animated.glb"></a-asset-item>
    </a-assets>

    <!-- The raycaster will emit mouse events on scene objects specified with the cantap class -->
    <a-camera id="camera" position="0 8 8" raycaster="objects: .cantap" cursor="
      fuse: false;
      rayOrigin: mouse;">
      <a-entity light="type: directional; intensity: 0.4;" position="0 0 0"></a-entity>
    </a-camera>

    <a-entity light="
      type: directional;
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      shadowCameraTop: 40;
      shadowCameraBottom: -40;
      shadowCameraRight: 40;
      shadowCameraLeft: -40;
      target: #camera" xrextras-attach="target: camera; offset: 8 15 4" position="1 4.3 2.5" shadow>
    </a-entity>

    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="hemisphere" color="#ffffff" ground-color="#8c8c8c" intensity="0.6"></a-light>

    <!-- Adding the cantap class allows the ground to be clicked -->
    <a-box id="ground" class="cantap" scale="1000 2 1000" position="0 -0.99 0"
      material="shader: shadow; transparent: true; opacity: 0.4" shadow>
    </a-box>
  </a-scene>

</body>

</html>
